<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFFFFF;
            --card-bg: #F4F4F4;
            --text-primary: #37352F;
            --text-secondary: rgba(55, 53, 47, 0.6);
            --divider-color: rgba(55, 53, 47, 0.09);
            --border-color: rgba(55, 53, 47, 0.09);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #191919;
                --card-bg: #222222;
                --text-primary: #D4D4D4;
                --text-secondary: rgba(255, 255, 255, 0.4);
                --divider-color: rgba(255, 255, 255, 0.1);
                --border-color: rgba(255, 255, 255, 0.1);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .widget-card {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            border-radius: 0;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.2s ease;
        }

        body.is-embedded .widget-card {
            width: calc(100% - 4px);
            height: calc(100% - 4px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--bg-color);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(12px, 4vw, 24px);
            padding: clamp(12px, 4vw, 24px);
            width: 100%;
            max-width: 400px;
        }

        .modes {
            display: flex;
            gap: clamp(6px, 2vw, 12px);
        }

        .mode-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: clamp(6px, 1.5vw, 8px) clamp(10px, 3vw, 18px);
            border-radius: 9999px;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: clamp(12px, 3.5vw, 15px);
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mode-btn:hover:not(.active) {
            color: var(--text-primary);
            border-color: var(--text-secondary);
            background: var(--card-bg);
        }

        .mode-btn.active {
            background: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
        }

        .timer-display {
            font-size: clamp(60px, 24vw, 120px);
            font-weight: 800;
            letter-spacing: -3px;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            line-height: 1;
            margin: clamp(8px, 3vw, 16px) 0;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: clamp(12px, 4vw, 20px);
        }

        .start-btn {
            background: var(--text-primary);
            color: var(--bg-color);
            border: none;
            padding: clamp(8px, 2vw, 12px) clamp(24px, 6vw, 32px);
            border-radius: 9999px;
            font-family: inherit;
            font-size: clamp(15px, 4vw, 18px);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .start-btn:hover {
            opacity: 0.9;
        }

        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s ease;
            width: clamp(34px, 8vw, 40px);
            height: clamp(34px, 8vw, 40px);
        }

        .icon-btn:hover, .icon-btn.active {
            color: var(--text-primary);
            background: var(--card-bg);
        }

        .icon-btn svg {
            width: 22px;
            height: 22px;
        }

        .sound-control-wrapper {
            position: relative;
            display: inline-block;
        }

        .sound-popover {
            position: absolute;
            bottom: calc(100% + 8px);
            right: 50%;
            transform: translateX(50%) translateY(4px);
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 2px;
            min-width: 140px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.15s ease, transform 0.15s ease;
            pointer-events: none;
        }

        .sound-popover.active {
            display: flex;
            opacity: 1;
            transform: translateX(50%) translateY(0);
            pointer-events: auto;
        }

        .sound-option {
            background: transparent;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            text-align: left;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.15s ease;
            width: 100%;
        }

        .sound-option:hover {
            background: var(--card-bg);
            color: var(--text-primary);
        }

        .sound-option.selected {
            color: var(--text-primary);
            font-weight: 700;
            background: var(--card-bg);
        }

        .sound-option::after {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: transparent;
            display: inline-block;
        }

        .sound-option.selected::after {
            background: var(--text-primary);
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.85);
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .widget-card:hover .fullscreen-btn {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .fullscreen-btn:hover {
            background: var(--card-bg);
            color: var(--text-primary);
        }

        .fullscreen-btn svg {
            width: 14px;
            height: 14px;
            stroke-width: 1.8;
            stroke: currentColor;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

    </style>
</head>
<body>

    <div class="widget-card">
        <div class="container">
            <div class="modes">
                <button class="mode-btn active" data-mode="pomodoro" data-time="25">Pomodoro</button>
                <button class="mode-btn" data-mode="shortBreak" data-time="5">Short Break</button>
                <button class="mode-btn" data-mode="longBreak" data-time="10">Long Break</button>
            </div>

            <div class="timer-display" id="time-display">25:00</div>

            <div class="controls-row">
                <button class="start-btn" id="start-btn">Start</button>
                
                <button class="icon-btn" id="reset-btn" aria-label="Reset Timer" style="transition: transform 0.4s ease;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"></path>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                </button>

                <div class="sound-control-wrapper">
                    <button class="icon-btn" id="sound-btn" aria-label="Select Soundscape">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 18V5l12-2v13"></path>
                            <circle cx="6" cy="18" r="3"></circle>
                            <circle cx="18" cy="16" r="3"></circle>
                        </svg>
                    </button>
                    
                    <div class="sound-popover" id="sound-popover">
                        <button class="sound-option selected" data-value="none">No Sound</button>
                        <button class="sound-option" data-value="rain">Rain</button>
                        <button class="sound-option" data-value="birds">Birds</button>
                        <button class="sound-option" data-value="train">Train</button>
                        <button class="sound-option" data-value="remix">Remix</button>
                    </div>
                </div>
            </div>
        </div>

        <button class="fullscreen-btn" id="fullscreen-btn" aria-label="Toggle Fullscreen">
            <!-- Expand Icon -->
            <svg class="icon-expand" viewBox="0 0 24 24" style="display: block;">
                <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
            </svg>
            <!-- Collapse Icon -->
            <svg class="icon-collapse" viewBox="0 0 24 24" style="display: none;">
                <path d="M4 14h6v6M20 10h-6V4M14 10l7-7M10 14l-7 7"/>
            </svg>
        </button>
    </div>

    <script>
        // Embedding Logic
        if (window !== window.parent) {
            document.body.classList.add('is-embedded');
        }

        // DOM Elements
        const timeDisplay = document.getElementById('time-display');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const soundBtn = document.getElementById('sound-btn');
        const soundPopover = document.getElementById('sound-popover');
        const soundOptions = document.querySelectorAll('.sound-option');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const iconExpand = document.querySelector('.icon-expand');
        const iconCollapse = document.querySelector('.icon-collapse');

        // State variables
        let timer = null;
        let isRunning = false;
        let currentMode = 'pomodoro';
        let defaultTime = 25 * 60; // in seconds
        let timeRemaining = defaultTime;
        let currentSound = 'none';

        // Audio Elements Setup
        let audioCtx = null;
        function initAudio() {
            // Keep this for the chime alert
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        const audioFiles = {
            rain: new Audio('./Sounds/2.Rain.mp3'),
            birds: new Audio('./Sounds/1.Birds.mp3'),
            train: new Audio('./Sounds/3.Train.mp3'),
            remix: new Audio('./Sounds/4.Remix Sound.mp3')
        };
        
        Object.values(audioFiles).forEach(audio => {
            audio.loop = true;
        });

        let currentAudio = null;

        function playSelectedSoundscape() {
            stopAllAudio();
            if (currentSound !== 'none' && audioFiles[currentSound]) {
                currentAudio = audioFiles[currentSound];
                currentAudio.play().catch(e => console.log('Audio play failed:', e));
            }
        }

        function stopAllAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }
        }

        function playAlertChime() {
            initAudio();
            const now = audioCtx.currentTime;
            
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            const gain2 = audioCtx.createGain();
            
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(880, now); // A5
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(1760, now); // A6
            
            gain1.gain.setValueAtTime(0, now);
            gain1.gain.linearRampToValueAtTime(0.12, now + 0.015);
            gain1.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
            
            gain2.gain.setValueAtTime(0, now);
            gain2.gain.linearRampToValueAtTime(0.04, now + 0.015);
            gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
            
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            
            osc1.start(now);
            osc1.stop(now + 1.3);
            osc2.start(now);
            osc2.stop(now + 0.7);
        }

        // Formatting time
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            timeDisplay.textContent = formatTime(timeRemaining);
            document.title = `${formatTime(timeRemaining)} - Pomodoro`;
        }

        // Mode Switching
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                initAudio();
                modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                currentMode = btn.dataset.mode;
                defaultTime = parseInt(btn.dataset.time, 10) * 60;
                
                resetTimer();
            });
        });

        let hasUserSelectedSound = false;

        function selectSound(value) {
            currentSound = value;
            soundOptions.forEach(opt => {
                if (opt.dataset.value === value) {
                    opt.classList.add('selected');
                } else {
                    opt.classList.remove('selected');
                }
            });
        }

        // Timer Logic
        function startTimer() {
            if (isRunning) return;
            initAudio();
            isRunning = true;
            startBtn.textContent = 'Pause';
            
            if (!hasUserSelectedSound && currentMode === 'pomodoro') {
                selectSound('remix');
            }
            
            playSelectedSoundscape();

            timer = setInterval(() => {
                if (timeRemaining > 0) {
                    timeRemaining--;
                    updateDisplay();
                } else {
                    clearInterval(timer);
                    isRunning = false;
                    startBtn.textContent = 'Start';
                    stopAllAudio();
                    playAlertChime();
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;
            isRunning = false;
            startBtn.textContent = 'Start';
            clearInterval(timer);
            stopAllAudio();
        }

        function resetTimer() {
            pauseTimer();
            timeRemaining = defaultTime;
            updateDisplay();
        }

        startBtn.addEventListener('click', () => {
            initAudio();
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        });

        resetBtn.addEventListener('click', () => {
            initAudio();
            resetTimer();
            resetBtn.style.transform = 'rotate(-360deg)';
            setTimeout(() => {
                resetBtn.style.transform = 'none';
            }, 400);
        });

        // Sound Popover Toggle
        soundBtn.addEventListener('click', (e) => {
            initAudio();
            e.stopPropagation();
            soundPopover.classList.toggle('active');
            soundBtn.classList.toggle('active');
        });

        // Close popover when clicking outside
        document.addEventListener('click', (e) => {
            if (soundPopover.classList.contains('active') && !soundPopover.contains(e.target) && e.target !== soundBtn) {
                soundPopover.classList.remove('active');
                soundBtn.classList.remove('active');
            }
        });

        // Sound Selection
        soundOptions.forEach(option => {
            option.addEventListener('click', () => {
                initAudio();
                hasUserSelectedSound = true;
                selectSound(option.dataset.value);
                
                stopAllAudio();
                
                if (isRunning) {
                    playSelectedSoundscape();
                }
                
                soundPopover.classList.remove('active');
                soundBtn.classList.remove('active');
            });
        });

        // Fullscreen Logic
        fullscreenBtn.addEventListener('click', () => {
            if (!hasUserSelectedSound && currentMode === 'pomodoro') {
                selectSound('remix');
                if (isRunning) {
                    playSelectedSoundscape();
                }
            }

            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                iconExpand.style.display = 'none';
                iconCollapse.style.display = 'block';
            } else {
                iconExpand.style.display = 'block';
                iconCollapse.style.display = 'none';
            }
        });

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
